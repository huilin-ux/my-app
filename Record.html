    const todayObj = new Date();

      year: todayObj.getFullYear(), 
      month: todayObj.getMonth() + 1, 
      day: todayObj.getDate(), 
      str: `${todayObj.getFullYear()}-${String(todayObj.getMonth() + 1).padStart(2, '0')}-${String(todayObj.getDate()).padStart(2, '0')}` 
    };

    const getDayOfWeek = (dateStr) => {
      const d = new Date(dateStr);
      const days = ["日", "一", "二", "三", "四", "五", "六"];
      return `星期${days[d.getDay()]}`;
    };

    function computeBill(b) {
      let daysLeft = 999, label = "", urgent = false, overdue = false;
      if (b.cycle === "monthly") {
        const due = b.dueDay;
        daysLeft = due >= TODAY.day ? due - TODAY.day : (31 - TODAY.day) + due;
        if (daysLeft <= 0) { label = "今天到期！"; urgent = true; }
        else if (daysLeft < 0) { label = "已逾期"; overdue = true; }
        else if (daysLeft <= b.advanceDays) { label = `${daysLeft}天後到期`; urgent = true; }
        else { label = `${daysLeft}天後`; }
      } else {
        const dm = b.dueMonth, dd = b.dueDay;
        if (dm > TODAY.month) daysLeft = (dm - TODAY.month) * 30 + (dd - TODAY.day);
        else if (dm === TODAY.month) daysLeft = dd - TODAY.day;
        else daysLeft = (12 - TODAY.month + dm) * 30 + (dd - TODAY.day);
        if (daysLeft < 0) { label = "已逾期"; overdue = true; }
        else if (daysLeft === 0) { label = "今天到期！"; urgent = true; }
        else if (daysLeft <= b.advanceDays) { label = `${daysLeft}天後到期`; urgent = true; }
        else { label = `${daysLeft}天後 (${dm}月${dd}日)`; }
      }
      return { ...b, daysLeft, label, urgent, overdue };
    }

      { tag: "持續買進", text: "與其絞盡腦汁省下每一塊錢，不如把精力投資在「提升自己的賺錢能力」上，然後持續買入資產。" },
      { tag: "致富心態", text: "致富需要承擔風險，但「守住財富」需要謙卑與恐懼。永遠為你的財務計畫留出容錯空間。" },

      template: (<svg viewBox="0 0 44 44" fill="none"><rect x="6" y="6" width="32" height="32" rx="6" fill={T.iGreen} stroke="#3D3020" strokeWidth="2.2" /><rect x="12" y="12" width="8" height="8" rx="2" fill="white" /><rect x="12" y="24" width="8" height="8" rx="2" fill="white" /><line x1="24" y1="15" x2="34" y2="15" stroke="white" strokeWidth="2.5" strokeLinecap="round" /><line x1="24" y1="27" x2="34" y2="27" stroke="white" strokeWidth="2.5" strokeLinecap="round" /><line x1="24" y1="31" x2="30" y2="31" stroke="white" strokeWidth="2" strokeLinecap="round" /></svg>),
      wallet: (<svg viewBox="0 0 44 44" fill="none"><rect x="6" y="14" width="32" height="22" rx="5" fill={T.iGreen} stroke="#3D3020" strokeWidth="2.2" /><path d="M6 20L38 20" stroke="#3D3020" strokeWidth="1.8" /><path d="M8 14L36 9Q38 9 38 11L38 14" fill={T.g4} stroke="#3D3020" strokeWidth="1.8" /><rect x="26" y="23" width="10" height="8" rx="3" fill={T.iYellow} stroke="#3D3020" strokeWidth="1.8" /></svg>),

      shield: (<svg viewBox="0 0 44 44" fill="none"><path d="M22 6L36 11L36 24Q36 34 22 40Q8 34 8 24L8 11Z" fill={T.g2} stroke="#3D3020" strokeWidth="2.2" strokeLinejoin="round" /><path d="M15 22L19 27L29 17" stroke="white" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round" /></svg>),
      bulb: (<svg viewBox="0 0 44 44" fill="none"><path d="M22 6C16 6 12 10 12 16C12 20.5 15.5 24 17 28L27 28C28.5 24 32 20.5 32 16C32 10 28 6 22 6Z" fill={T.iYellow} stroke="#3D3020" strokeWidth="2.2" /><path d="M19 32L25 32M20 36L24 36" stroke="#3D3020" strokeWidth="2.2" strokeLinecap="round" /></svg>),
    };

    const INIT_TXNS = [
      { id: uid(), date: TODAY.str, type: "exp", cat: "🏠 居住", desc: "房貸", amount: 32000, who: "我" },
      { id: uid(), date: TODAY.str, type: "exp", cat: "📚 教育", desc: "安親班", amount: 6500, who: "我" },

      { id: uid(), name: "小孩醫療險", company: "富邦", premium: 14400, cycle: "年繳", coverage: 500000, expiry: "2040-06", color: T.g3, memo: "每年 6 月扣款" },

      { id: uid(), name: "買房換房基金", emoji: "🏡", target: 3000000, saved: 1200000, monthly: 20000, color: T.g1, deadline: "2030", memo: "目前鎖定重劃區三房" },
      { id: uid(), name: "緊急預備金", emoji: "🛟", target: 500000, saved: 380000, monthly: 10000, color: T.coral, deadline: "2026", memo: "放置於高利活存帳戶" },
    ];
    const INIT_BILLS = [
      { id: uid(), name: "房貸", amount: 32000, cycle: "monthly", dueDay: 25, dueMonth: 0, category: "🏠 居住", paid: true, color: T.g1, advanceDays: 5 },
      { id: uid(), name: "信貸還款", amount: 8500, cycle: "monthly", dueDay: 30, dueMonth: 0, category: "💼 其他", paid: false, color: T.coral, advanceDays: 3 },
      { id: uid(), name: "汽車貸款", amount: 6000, cycle: "monthly", dueDay: 10, dueMonth: 0, category: "🚗 交通", paid: false, color: T.amber, advanceDays: 3 },
    ];

    const INVEST = [
      { name: "台股/ETF", value: 450000, cost: 370000 },
      { name: "美股", value: 420000, cost: 380000 },
      { name: "房地產估值", value: 12500000, cost: 10000000 },
      { name: "保險儲蓄", value: 580000, cost: 540000 },
    ];

    /* ─── UI ATOMS ─── */
    const Card = ({ children, style = {} }) => (
      <div style={{ background: T.white, borderRadius: 20, boxShadow: `0 2px 16px ${T.shadow},0 1px 4px rgba(0,0,0,0.04)`, padding: 20, ...style }}>{children}</div>
    );
    const Bar = ({ value, color = T.g2, h = 8 }) => (
      <div style={{ background: T.g5, borderRadius: 99, height: h, overflow: "hidden" }}>
        <div style={{ width: `${value}%`, height: "100%", borderRadius: 99, background: color, transition: "width 0.9s cubic-bezier(.4,0,.2,1)" }} />
      </div>
    );
    const Badge = ({ children, color = T.g2 }) => (
      <span style={{ fontSize: 10, fontWeight: 700, color, background: color + "1A", borderRadius: 20, padding: "2px 9px" }}>{children}</span>
    );
    const Btn = ({ children, onClick, color = T.g1, outline = false, small = false, disabled = false, style = {} }) => (
      <button onClick={onClick} disabled={disabled} style={{
        padding: small ? "6px 13px" : "13px 22px", borderRadius: 12, border: outline ? `1.5px solid ${color}` : "none",
        background: outline ? "transparent" : disabled ? "#d5ddd0" : color, color: outline ? color : disabled ? T.muted : "#fff",
        fontSize: small ? 12 : 14, fontWeight: 700, cursor: disabled ? "default" : "pointer", fontFamily: "inherit",
        boxShadow: outline || disabled ? "none" : `0 4px 14px ${color}33`, ...style,
      }}>{children}</button>
    );
    const Modal = ({ open, onClose, title, children }) => {
      if (!open) return null;
      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 300, background: "rgba(45,106,79,0.15)", backdropFilter: "blur(6px)", display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
          <div onClick={e => e.stopPropagation()} style={{ background: T.white, borderRadius: "24px 24px 0 0", width: "100%", maxWidth: 430, padding: "24px 20px 44px", boxShadow: `0 -8px 40px ${T.shadow}`, maxHeight: "90vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}><div style={{ fontSize: 17, fontWeight: 800, color: T.g1 }}>{title}</div><button onClick={onClose} style={{ width: 32, height: 32, borderRadius: "50%", border: "none", background: T.bgDeep, color: T.muted, fontSize: 20, cursor: "pointer" }}>×</button></div>
            {children}
          </div>
        </div>
      );
    };
    const Field = ({ label, children }) => (<div style={{ marginBottom: 14 }}><div style={{ fontSize: 11, fontWeight: 700, color: T.muted, marginBottom: 5 }}>{label}</div>{children}</div>);
    const Inp = ({ value, onChange, placeholder, type = "text", style = {} }) => (<input value={value} onChange={onChange} placeholder={placeholder} type={type} style={{ width: "100%", padding: "11px 14px", borderRadius: 11, border: `1.5px solid ${T.dim}`, background: T.bg, fontSize: 14, color: T.slate, outline: "none", fontFamily: "inherit", boxSizing: "border-box", ...style }} />);
    const Seg = ({ value, onChange, options }) => (<div style={{ display: "flex", background: T.bgDeep, borderRadius: 12, padding: 4, gap: 4 }}>{options.map(o => (<button key={o.value} onClick={() => onChange(o.value)} style={{ flex: 1, padding: "8px 4px", borderRadius: 9, border: "none", cursor: "pointer", background: value === o.value ? T.white : "transparent", color: value === o.value ? T.g1 : T.muted, fontSize: 12, fontWeight: 700, boxShadow: value === o.value ? `0 1px 4px ${T.shadow}` : "none", transition: "all 0.18s" }}>{o.label}</button>))}</div>);
    const CList = ({ color, style = {} }) => (
      <div style={{ display: "flex", gap: 10, marginTop: 4, ...style }}>
        {[T.coral, T.amber, T.g2, T.g3, T.iBlue, "#A78BFA"].map(c => <div key={c} onClick={() => color.set({ ...color.obj, color: c })} style={{ width: 28, height: 28, borderRadius: "50%", background: c, cursor: "pointer", border: color.obj.color === c ? `3px solid ${T.g1}` : "3px solid transparent" }} />)}
      </div>
    );

    /* ─── PAGES ─── */
    function HomePage({ txns, loans, goals, currentMonth, cats }) {
      const mt = txns.filter(t => t.date.startsWith(currentMonth));
      const inc = mt.filter(t => t.type === "inc").reduce((s, t) => s + t.amount, 0);
      const exp = mt.filter(t => t.type === "exp").reduce((s, t) => s + t.amount, 0);
      const myInc = mt.filter(t => t.type === "inc" && t.who === "我").reduce((s, t) => s + t.amount, 0);
      const hInc = mt.filter(t => t.type === "inc" && t.who === "老公").reduce((s, t) => s + t.amount, 0);
      const myPct = pct(myInc, inc || 1);
      const investTotal = INVEST.reduce((s, i) => s + i.value, 0);
      const goalSaved = goals.reduce((s, g) => s + g.saved, 0);
      const totalAssets = investTotal + goalSaved;
      const totalDebt = loans.reduce((s, l) => s + (l.total - l.paid), 0);
      const netWorth = totalAssets - totalDebt;
      
      const catMap = {};
      mt.filter(t => t.type === "exp").forEach(t => { catMap[t.cat] = (catMap[t.cat] || 0) + t.amount; });
      const topCats = Object.entries(catMap).sort((a, b) => b[1] - a[1]).slice(0, 4);

      const tipIndex = (TODAY.year + TODAY.month + TODAY.day) % DAILY_TIPS.length;
      const todayTip = DAILY_TIPS[tipIndex];

      let riskScore = 0; const advises = [];
      if (inc > 0) {
        const cashFlowRatio = Math.round((exp / inc) * 100);
        if (cashFlowRatio > 80) { riskScore += 2; advises.push(`本月支出高達收入的 ${cashFlowRatio}%。高儲蓄率比高報酬更重要，請留意現金流防禦。`); }
        else if (cashFlowRatio <= 50) advises.push("本月儲蓄率極佳！結餘資金請繼續堅持「持續買進」優質資產的紀律。");
      } else { advises.push("本月目前尚未紀錄收入。"); }

      const emergencyGoal = goals.find(g => g.name.includes("緊急預備金"));
      if (emergencyGoal) {
        const ePct = pct(emergencyGoal.saved, emergencyGoal.target);
        if (ePct < 100) { riskScore += 1; advises.push(`緊急預備金進度 ${ePct}%。請優先補足，這是你理財路上最重要的「容錯空間」。`); }
      } else { riskScore += 1; advises.push("未設立「緊急預備金」目標。致富的關鍵在於存活，請預留至少 6 個月生活費的容錯空間。"); }

      const debtRatio = totalAssets > 0 ? Math.round((totalDebt / (totalAssets + totalDebt)) * 100) : 0;
      if (debtRatio > 40) { riskScore += 2; advises.push(`負債佔總資產比達 ${debtRatio}%。建議優先償還高利率債務（如信貸），以降低財務脆弱性。`); }

      let riskLevel = "🟢 財務體質穩健", riskColor = T.g2, riskBg = "#E4F4EC";
      if (riskScore >= 3) { riskLevel = "🔴 高風險注意"; riskColor = T.red; riskBg = "#FFF0EE"; } 
      else if (riskScore > 0) { riskLevel = "🟡 中度風險提示"; riskColor = T.amber; riskBg = "#FFF8F0"; }

      return (

    function AnalysisPage({ txns, currentMonth, cats }) {
      const [view, setView] = useState("monthTrend");
      
      const [cy, cm] = currentMonth.split("-").map(Number);
      
      const yearMonths = Array.from({length: 12}, (_, i) => `${cy}-${String(i+1).padStart(2, '0')}`);
      const monthData = yearMonths.map(m => {
        const mt = txns.filter(t => t.date.startsWith(m));
        const inc = mt.filter(t => t.type === "inc").reduce((s, t) => s + t.amount, 0);
        const exp = mt.filter(t => t.type === "exp").reduce((s, t) => s + t.amount, 0);
        return { month: m, inc, exp, balance: inc - exp };
      });
      const maxVal = Math.max(...monthData.flatMap(d => [d.inc, d.exp]), 1);
      
      const uniqueYears = Array.from(new Set(txns.map(t => t.date.substring(0, 4)))).sort();
      if(!uniqueYears.includes(String(cy))) uniqueYears.push(String(cy));
      uniqueYears.sort();
      
      const yearData = uniqueYears.map(y => {
        const yt = txns.filter(t => t.date.startsWith(y));
        const inc = yt.filter(t => t.type === "inc").reduce((s, t) => s + t.amount, 0);
        const exp = yt.filter(t => t.type === "exp").reduce((s, t) => s + t.amount, 0);
        return { year: y, inc, exp, balance: inc - exp };
      });
      const maxYVal = Math.max(...yearData.flatMap(d => [d.inc, d.exp]), 1);

      const currYData = yearData.find(d => d.year === String(cy)) || { exp: 0, inc: 0 };
      const prevYData = yearData.find(d => d.year === String(cy - 1)) || { exp: 0, inc: 0 };
      const yDiff = currYData.exp - prevYData.exp;
      const yDiffPct = prevYData.exp > 0 ? Math.abs(Math.round(yDiff / prevYData.exp * 100)) : (currYData.exp > 0 ? 100 : 0);

      const currentMt = txns.filter(t => t.date.startsWith(currentMonth));
      const catMap = {};
      currentMt.filter(t => t.type === "exp").forEach(t => { catMap[t.cat] = (catMap[t.cat] || 0) + t.amount; });
      const totalExp = Object.values(catMap).reduce((s, v) => s + v, 0) || 1;
      const catList = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
      
      const prevMonthStr = cm === 1 ? `${cy-1}-12` : `${cy}-${String(cm-1).padStart(2, '0')}`;
      const prevMt = txns.filter(t => t.date.startsWith(prevMonthStr));
      const prevExp = prevMt.filter(t => t.type === "exp").reduce((s, t) => s + t.amount, 0);
      const currExp = currentMt.filter(t => t.type === "exp").reduce((s, t) => s + t.amount, 0);
      const diff = currExp - prevExp;
      const diffPct = prevExp > 0 ? Math.abs(Math.round(diff / prevExp * 100)) : 0;
      
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Seg value={view} onChange={setView} options={[{ value: "monthTrend", label: "📈 月趨勢" }, { value: "yearTrend", label: "📊 年比較" }, { value: "cat", label: "🥧 本月類別" }]} />
          
          {view === "monthTrend" && (<>
            <Card>
              <div style={{ fontSize: 13, fontWeight: 700, color: T.g1, marginBottom: 16 }}>{cy} 年度各月收支趨勢</div>
              <div style={{ display: "flex", gap: 12, alignItems: "flex-end", height: 160, overflowX: "auto", paddingBottom: 8 }}>
                {monthData.map(d => {

                        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "flex-end", height: "100%" }}><div style={{ width: "100%", borderRadius: "4px 4px 0 0", height: `${pct(d.exp, maxVal)}%`, background: T.coral, minHeight: 2 }} /></div>
                      </div>
                      <div style={{ fontSize: 11, color: isCurrent ? T.g1 : T.muted, fontWeight: isCurrent ? 800 : 600 }}>{parseInt(d.month.split("-")[1])}月</div>
                    </div>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 16, marginTop: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 10, height: 10, borderRadius: 3, background: T.g2 }} /><span style={{ fontSize: 11, color: T.muted }}>收入</span></div>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 10, height: 10, borderRadius: 3, background: T.coral }} /><span style={{ fontSize: 11, color: T.muted }}>支出</span></div>
                <div style={{ fontSize: 11, color: T.muted, marginLeft: "auto" }}>左右滑動 👉</div>
              </div>
            </Card>
            <Card style={{ borderLeft: `4px solid ${diff > 0 ? T.coral : T.g2}` }}>
              <div style={{ fontSize: 12, color: T.muted, marginBottom: 6 }}>{cm}月 與上個月相比</div>
              <div style={{ fontSize: 20, fontWeight: 900, color: diff > 0 ? T.coral : T.g2 }}>{diff > 0 ? "▲ 多支出" : "▼ 少支出"} NT$ {fmt(Math.abs(diff))}</div>
              <div style={{ fontSize: 12, color: T.muted, marginTop: 4 }}>{diff > 0 ? `比上個月多花了 ${diffPct}%，注意預算！` : `比上個月節省 ${diffPct}%，做得很棒！`}</div>
            </Card>
          </>)}

          {view === "yearTrend" && (<>
            <Card>
              <div style={{ fontSize: 13, fontWeight: 700, color: T.g1, marginBottom: 16 }}>歷年總收支比較</div>
              <div style={{ display: "flex", gap: 20, alignItems: "flex-end", height: 160, overflowX: "auto", paddingBottom: 8 }}>
                {yearData.map(d => {
                  const isCurrent = d.year === String(cy);
                  return (
                    <div key={d.year} style={{ flexShrink: 0, width: 50, display: "flex", flexDirection: "column", alignItems: "center", gap: 6, opacity: isCurrent ? 1 : 0.65 }}>
                      <div style={{ width: "100%", display: "flex", gap: 4, alignItems: "flex-end", height: 120, background: isCurrent ? T.g5 : "transparent", padding: "4px", borderRadius: 6 }}>
                        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "flex-end", height: "100%" }}><div style={{ width: "100%", borderRadius: "4px 4px 0 0", height: `${pct(d.inc, maxYVal)}%`, background: T.g2, minHeight: 2 }} /></div>
                        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "flex-end", height: "100%" }}><div style={{ width: "100%", borderRadius: "4px 4px 0 0", height: `${pct(d.exp, maxYVal)}%`, background: T.coral, minHeight: 2 }} /></div>
                      </div>
                      <div style={{ fontSize: 12, color: isCurrent ? T.g1 : T.muted, fontWeight: isCurrent ? 800 : 600 }}>{d.year}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 16, marginTop: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 10, height: 10, borderRadius: 3, background: T.g2 }} /><span style={{ fontSize: 11, color: T.muted }}>總收入</span></div>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 10, height: 10, borderRadius: 3, background: T.coral }} /><span style={{ fontSize: 11, color: T.muted }}>總支出</span></div>
              </div>
            </Card>
            <Card style={{ borderLeft: `4px solid ${yDiff > 0 ? T.coral : T.g2}` }}>
              <div style={{ fontSize: 12, color: T.muted, marginBottom: 6 }}>{cy}年 與去年({cy-1}年) 相比</div>
              <div style={{ fontSize: 20, fontWeight: 900, color: yDiff > 0 ? T.coral : T.g2 }}>{yDiff > 0 ? "▲ 多支出" : "▼ 少支出"} NT$ {fmt(Math.abs(yDiff))}</div>
              <div style={{ fontSize: 12, color: T.muted, marginTop: 4 }}>
                {prevYData.exp === 0 ? "去年無資料可比較。" : (yDiff > 0 ? `比起去年多花了 ${yDiffPct}%。` : `比起去年節省了 ${yDiffPct}%，請繼續保持！`)}
              </div>
            </Card>
          </>)}
          
          {view === "cat" && (<>
            <Card>
              <div style={{ fontSize: 13, fontWeight: 700, color: T.g1, marginBottom: 4 }}>{cm}月 支出類別</div>
              {catList.length === 0 ? <div style={{ fontSize: 12, color: T.muted, textAlign: "center", padding: "10px 0" }}>本月尚無紀錄</div> : <>
                <div style={{ fontSize: 11, color: T.muted, marginBottom: 16 }}>總計 NT$ {fmt(totalExp)}</div>
                <div style={{ display: "flex", height: 20, borderRadius: 99, overflow: "hidden", gap: 1, marginBottom: 16 }}>

                      <Bar value={pct(amt, totalExp)} color={cats[cat] || T.g2} h={7} />
                    </div>
                  ))}
                </div>
              </>}
            </Card>
          </>)}
        </div>
      );
    }

                <div style={{ fontSize: 15, fontWeight: 700, color: T.g1, textDecoration: b.paid ? "line-through" : "none" }}>{b.name}</div>
                <div style={{ fontSize: 11, color: T.muted, marginTop: 2 }}>{b.category} · 提前 {b.advanceDays} 天提醒 {b.cycle === "monthly" && ` · 每月 ${b.dueDay} 號`}</div>
              </div>
              <div style={{ textAlign: "right" }}><div style={{ fontSize: 19, fontWeight: 900, color: b.paid ? T.muted : T.g1 }}>{fmt(b.amount)}</div><div style={{ fontSize: 10, color: T.muted }}>{b.cycle === "monthly" ? "/ 月" : "/ 年"}</div></div>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 12 }}>

            </div>
          </div>
        );
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>

            <div style={{ display: "flex", gap: 10, marginTop: 8 }}><Btn onClick={() => setShowM(false)} color={T.muted} outline style={{ flex: 1 }}>取消</Btn><Btn onClick={save} color={T.g1} style={{ flex: 2 }}>儲存</Btn></div>
          </Modal>

      const oNI = () => { setEIId(null); setInf(EI); setShowIM(true); };
      const oEI = i => { setEIId(i.id); setInf({ ...i, premium: String(i.premium), coverage: String(i.coverage), memo: i.memo || "" }); setShowIM(true); };
      const svI = () => { const it = { id: eIId || uid(), name: inf.name, company: inf.company, premium: +inf.premium, cycle: inf.cycle, coverage: +inf.coverage, expiry: inf.expiry, color: inf.color, memo: inf.memo }; setIns(p => eIId ? p.map(i => i.id === eIId ? it : i) : [...p, it]); setShowIM(false); };
      const dI = id => setIns(p => p.filter(i => i.id !== id));

      const oNG = () => { setEGId(null); setGf(EG); setShowGM(true); };
      const oEG = g => { setEGId(g.id); setGf({ ...g, target: String(g.target), saved: String(g.saved), monthly: String(g.monthly), memo: g.memo || "" }); setShowGM(true); };
      const svG = () => { const it = { id: eGId || uid(), name: gf.name, emoji: gf.emoji, target: +gf.target, saved: +gf.saved, monthly: +gf.monthly, color: gf.color, deadline: gf.deadline, memo: gf.memo }; setGoals(p => eGId ? p.map(g => g.id === eGId ? it : g) : [...p, it]); setShowGM(false); };
      const dG = id => setGoals(p => p.filter(g => g.id !== id));

      const totalDebt = loans.reduce((s, l) => s + (l.total - l.paid), 0);
      const totalMo = loans.reduce((s, l) => s + l.monthly, 0);
      const totalPre = ins.filter(i => i.cycle === "月繳").reduce((s, i) => s + i.premium, 0) + ins.filter(i => i.cycle === "年繳").reduce((s, i) => s + Math.round(i.premium / 12), 0);
      const totalSaved = goals.reduce((s, g) => s + g.saved, 0);
      const totalTarget = goals.reduce((s, g) => s + g.target, 0);

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Seg value={tab} onChange={setTab} options={[{ value: "loan", label: "💸 貸款" }, { value: "ins", label: "🛡️ 保險" }, { value: "goal", label: "🎯 目標" }]} />

          {tab === "loan" && (<>
            <div style={{ background: `linear-gradient(135deg,${T.g1},${T.g2})`, borderRadius: 22, padding: "20px 22px" }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", letterSpacing: 2, marginBottom: 4 }}>家庭未還貸款</div>
              <div style={{ fontSize: 28, fontWeight: 900, color: "#fff" }}>NT$ {fmt(totalDebt)}</div>
              <div style={{ display: "flex", gap: 16, marginTop: 10 }}>
                <div><div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)" }}>每月還款</div><div style={{ fontSize: 15, fontWeight: 700, color: "rgba(255,255,255,0.9)" }}>{fmt(totalMo)}</div></div>
                <div><div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)" }}>最快還完</div><div style={{ fontSize: 15, fontWeight: 700, color: "rgba(255,255,255,0.9)" }}>{totalMo > 0 ? `約${Math.ceil(totalDebt / totalMo)}月` : "—"}</div></div>
              </div>
            </div>
            <Btn onClick={oNL} color={T.g2} style={{ width: "100%" }}>＋ 新增貸款</Btn>
            {loans.map(l => {
              const rem = l.total - l.paid, p = pct(l.paid, l.total), done = rem <= 0; return (
                <Card key={l.id} style={{ borderLeft: `4px solid ${done ? T.g3 : l.color}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                    <div style={{ flex: 1, paddingRight: 8 }}>
                      <Badge color={done ? T.g2 : l.color}>{done ? "✓ 還清" : `${l.rate}% 年利率`}</Badge>
                      <div style={{ fontSize: 15, fontWeight: 700, color: T.g1, marginTop: 5 }}>{l.name}</div>
                      <div style={{ fontSize: 11, color: T.muted, marginTop: 2 }}>{done ? "🎉 恭喜！" : `剩 ${fmt(rem)} · 月付 ${fmt(l.monthly)}`}</div>
                      {l.memo && <div style={{ fontSize: 11, color: T.slate, background: T.bgDeep, padding: "5px 8px", borderRadius: 6, marginTop: 6, display: "inline-block" }}>📝 {l.memo}</div>}
                    </div>
                    <div style={{ fontSize: 22, fontWeight: 900, color: done ? T.g2 : l.color }}>{p}%</div>
                  </div>
                  <Bar value={p} color={done ? T.g3 : l.color} h={10} />
                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                    {!done && <Btn onClick={() => pL(l.id)} color={T.g2} small outline>還款</Btn>}
                    <Btn onClick={() => oEL(l)} color={T.slate} small outline>編輯</Btn>
                    <Btn onClick={() => dL(l.id)} color={T.coral} small outline>刪除</Btn>
                  </div>
                </Card>
              );
            })}
            <Modal open={showLM} onClose={() => setShowLM(false)} title={eLId ? "編輯貸款" : "新增貸款"}>
              <Field label="名稱"><Inp value={lf.name} onChange={e => setLf({ ...lf, name: e.target.value })} placeholder="例：信用貸款" /></Field>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <Field label="總金額"><Inp value={lf.total} onChange={e => setLf({ ...lf, total: e.target.value })} type="number" placeholder="350000" /></Field>
                <Field label="已還"><Inp value={lf.paid} onChange={e => setLf({ ...lf, paid: e.target.value })} type="number" placeholder="0" /></Field>
                <Field label="月還款"><Inp value={lf.monthly} onChange={e => setLf({ ...lf, monthly: e.target.value })} type="number" placeholder="8500" /></Field>
                <Field label="年利率%"><Inp value={lf.rate} onChange={e => setLf({ ...lf, rate: e.target.value })} type="number" placeholder="5.88" /></Field>
              </div>
              <Field label="備註（選填）"><Inp value={lf.memo} onChange={e => setLf({ ...lf, memo: e.target.value })} placeholder="例如：預計領年終多還一點" /></Field>
              <Field label="顏色"><CList color={{ obj: lf, set: setLf }} /></Field>
              <div style={{ display: "flex", gap: 10, marginTop: 8 }}><Btn onClick={() => setShowLM(false)} color={T.muted} outline style={{ flex: 1 }}>取消</Btn><Btn onClick={svL} color={T.g1} style={{ flex: 2 }}>儲存</Btn></div>
            </Modal>
          </>)}

          {tab === "ins" && (<>
            <div style={{ background: `linear-gradient(135deg,${T.g1},${T.g2})`, borderRadius: 22, padding: "20px 22px" }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", letterSpacing: 2, marginBottom: 4 }}>保險保障</div>
              <div style={{ fontSize: 28, fontWeight: 900, color: "#fff" }}>{ins.length} 張保單</div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.7)", marginTop: 6 }}>每月保費約 NT$ {fmt(totalPre)}</div>
            </div>
            <Btn onClick={oNI} color={T.g2} style={{ width: "100%" }}>＋ 新增保險</Btn>
            {ins.map(i => (
              <Card key={i.id} style={{ borderLeft: `4px solid ${i.color}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div style={{ flex: 1, paddingRight: 8 }}>
                    <div style={{ display: "flex", gap: 6, marginBottom: 5, flexWrap: "wrap" }}><Badge color={i.color}>{i.cycle}</Badge><Badge color={T.muted}>{i.company}</Badge></div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: T.g1 }}>{i.name}</div>
                    <div style={{ fontSize: 11, color: T.muted, marginTop: 2 }}>保額 {fmt(i.coverage)} · 到期 {i.expiry}</div>
                    {i.memo && <div style={{ fontSize: 11, color: T.slate, background: T.bgDeep, padding: "5px 8px", borderRadius: 6, marginTop: 6, display: "inline-block" }}>📝 {i.memo}</div>}
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 18, fontWeight: 900, color: i.color }}>{fmt(i.premium)}</div>
                    <div style={{ fontSize: 10, color: T.muted }}>{i.cycle}</div>
                    {i.cycle === "年繳" && (
                      <div style={{ fontSize: 11, color: T.coral, marginTop: 4, fontWeight: 700, background: T.coral+"15", padding: "2px 6px", borderRadius: 4 }}>
                        平均月繳 {fmt(Math.round(i.premium / 12))}
                      </div>
                    )}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}><Btn onClick={() => oEI(i)} color={T.slate} small outline>編輯</Btn><Btn onClick={() => dI(i.id)} color={T.coral} small outline>刪除</Btn></div>
              </Card>
            ))}
            <Modal open={showIM} onClose={() => setShowIM(false)} title={eIId ? "編輯保險" : "新增保險"}>
              <Field label="保單名稱"><Inp value={inf.name} onChange={e => setInf({ ...inf, name: e.target.value })} placeholder="例：定期壽險" /></Field>
              <Field label="保險公司"><Inp value={inf.company} onChange={e => setInf({ ...inf, company: e.target.value })} placeholder="例：南山" /></Field>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <Field label="保費"><Inp value={inf.premium} onChange={e => setInf({ ...inf, premium: e.target.value })} type="number" placeholder="4800" /></Field>
                <Field label="繳費方式"><Seg value={inf.cycle} onChange={v => setInf({ ...inf, cycle: v })} options={[{ value: "月繳", label: "月繳" }, { value: "年繳", label: "年繳" }]} /></Field>
                <Field label="保障額度"><Inp value={inf.coverage} onChange={e => setInf({ ...inf, coverage: e.target.value })} type="number" placeholder="5000000" /></Field>
                <Field label="到期日"><Inp value={inf.expiry} onChange={e => setInf({ ...inf, expiry: e.target.value })} placeholder="2045-01" /></Field>
              </div>
              <Field label="備註（選填）"><Inp value={inf.memo} onChange={e => setInf({ ...inf, memo: e.target.value })} placeholder="例如：每年 6 月扣款" /></Field>
              <Field label="顏色"><CList color={{ obj: inf, set: setInf }} /></Field>
              <div style={{ display: "flex", gap: 10, marginTop: 8 }}><Btn onClick={() => setShowIM(false)} color={T.muted} outline style={{ flex: 1 }}>取消</Btn><Btn onClick={svI} color={T.g1} style={{ flex: 2 }}>儲存</Btn></div>
            </Modal>
          </>)}

          {tab === "goal" && (<>
            <div style={{ background: `linear-gradient(135deg,${T.g1},${T.g2})`, borderRadius: 22, padding: "20px 22px" }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", letterSpacing: 2, marginBottom: 4 }}>存款目標</div>
              <div style={{ fontSize: 28, fontWeight: 900, color: "#fff" }}>NT$ {fmt(totalSaved)}</div>
              <div style={{ marginTop: 12 }}><div style={{ background: "rgba(255,255,255,0.2)", borderRadius: 99, height: 10, overflow: "hidden" }}><div style={{ width: `${pct(totalSaved, totalTarget)}%`, height: "100%", borderRadius: 99, background: "rgba(255,255,255,0.85)", transition: "width 0.9s" }} /></div></div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.65)", marginTop: 6 }}>整體 {pct(totalSaved, totalTarget)}% · 月存 {fmt(goals.reduce((s, g) => s + g.monthly, 0))}</div>
            </div>
            <Btn onClick={oNG} color={T.g2} style={{ width: "100%" }}>＋ 新增目標</Btn>
            {goals.map(g => {
              const p = pct(g.saved, g.target), months = Math.ceil((g.target - g.saved) / g.monthly); return (
                <Card key={g.id} style={{ borderLeft: `4px solid ${g.color}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                      <div style={{ width: 44, height: 44, borderRadius: 13, fontSize: 20, background: g.color + "18", border: `1px solid ${g.color}44`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{g.emoji}</div>
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 700, color: T.g1 }}>{g.name}</div>
                        <div style={{ fontSize: 10, color: T.muted, marginTop: 2 }}>目標 {g.deadline} · 月存 {fmt(g.monthly)}</div>
                        {g.memo && <div style={{ fontSize: 11, color: T.slate, background: T.bgDeep, padding: "5px 8px", borderRadius: 6, marginTop: 6, display: "inline-block" }}>📝 {g.memo}</div>}
                      </div>
                    </div>
                    <div style={{ fontSize: 22, fontWeight: 900, color: g.color }}>{p}%</div>
                  </div>
                  <Bar value={p} color={g.color} h={10} />
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, alignItems: "center" }}>
                    <div style={{ display: "flex", gap: 14 }}>
                      {[["已存", fmt(g.saved)], ["目標", fmt(g.target)], ["還需", months + "月"]].map(([l, v]) => (
                        <div key={l}><div style={{ fontSize: 10, color: T.dim }}>{l}</div><div style={{ fontSize: 12, fontWeight: 700, color: T.slate }}>{v}</div></div>
                      ))}
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <Btn onClick={() => oEG(g)} color={T.slate} small outline>編輯</Btn>
                      <Btn onClick={() => dG(g.id)} color={T.coral} small outline>刪除</Btn>
                    </div>
                  </div>
                </Card>
              );
            })}
            <Modal open={showGM} onClose={() => setShowGM(false)} title={eGId ? "編輯目標" : "新增目標"}>
              <Field label="Emoji"><div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 2 }}>{EMOJIS.map(e => <button key={e} onClick={() => setGf({ ...gf, emoji: e })} style={{ width: 38, height: 38, borderRadius: 10, border: `2px solid ${gf.emoji === e ? T.g1 : T.dim}`, background: gf.emoji === e ? T.g5 : T.bg, fontSize: 20, cursor: "pointer", fontFamily: "inherit" }}>{e}</button>)}</div></Field>
              <Field label="目標名稱"><Inp value={gf.name} onChange={e => setGf({ ...gf, name: e.target.value })} placeholder="例：出國旅遊" /></Field>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <Field label="目標金額"><Inp value={gf.target} onChange={e => setGf({ ...gf, target: e.target.value })} type="number" placeholder="150000" /></Field>
                <Field label="已存金額"><Inp value={gf.saved} onChange={e => setGf({ ...gf, saved: e.target.value })} type="number" placeholder="0" /></Field>
                <Field label="每月存入"><Inp value={gf.monthly} onChange={e => setGf({ ...gf, monthly: e.target.value })} type="number" placeholder="5000" /></Field>
                <Field label="目標年份"><Inp value={gf.deadline} onChange={e => setGf({ ...gf, deadline: e.target.value })} placeholder="2028" /></Field>
              </div>
              <Field label="備註（選填）"><Inp value={gf.memo} onChange={e => setGf({ ...gf, memo: e.target.value })} placeholder="例如：投入 0050 ETF" /></Field>
              <Field label="顏色"><CList color={{ obj: gf, set: setGf }} /></Field>
              <div style={{ display: "flex", gap: 10, marginTop: 8 }}><Btn onClick={() => setShowGM(false)} color={T.muted} outline style={{ flex: 1 }}>取消</Btn><Btn onClick={svG} color={T.g1} style={{ flex: 2 }}>儲存</Btn></div>
            </Modal>
          </>)}
        </div>
      );
    }

    function TabBar({ active, setActive, urgentBills }) {
      const tabs = [
        { id: "home", icon: IC.home, label: "總覽" },
        { id: "record", icon: IC.record, label: "記帳" },
        { id: "analysis", icon: IC.analysis, label: "分析" },
        { id: "bills", icon: IC.bell, label: "帳單", badge: urgentBills },
        { id: "fin", icon: IC.finance, label: "財務" },
      ];
      return (
        <nav style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "rgba(255,255,255,0.97)", backdropFilter: "blur(20px)", borderTop: `1px solid ${T.dim}`, display: "flex", justifyContent: "space-around", padding: "8px 0 20px", zIndex: 100, boxShadow: `0 -4px 24px ${T.shadow}` }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActive(t.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, background: "none", border: "none", cursor: "pointer", transition: "all 0.2s", padding: "4px 8px", fontFamily: "inherit", position: "relative" }}>
              <div style={{ width: 32, height: 32, opacity: active === t.id ? 1 : 0.42, filter: active === t.id ? `drop-shadow(0 2px 5px ${T.g3})` : "none", transition: "all 0.2s" }}>{t.icon}</div>
              {t.badge > 0 && <div style={{ position: "absolute", top: 0, right: 4, width: 16, height: 16, borderRadius: "50%", background: T.red, color: "white", fontSize: 9, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center" }}>{t.badge}</div>}
              <span style={{ fontSize: 10, fontWeight: 700, color: active === t.id ? T.g1 : T.muted }}>{t.label}</span>
            </button>
          ))}
        </nav>
      );
    }

    /* ─── APP INITIALIZATION ─── */
    const loadData = (key, defaultData) => {
      try {
        const saved = localStorage.getItem(key);
        if (saved) return JSON.parse(saved);
      } catch (e) {
        console.error("讀取資料失敗", e);
      }
      return defaultData;
    };

    function App() {
      const [tab, setTab] = useState("home");
      
      const [cats, setCats] = useState(() => loadData('fin_cats', INITIAL_CATS));
      const [txns, setTxns] = useState(() => loadData('fin_txns', INIT_TXNS));
      const [bills, setBills] = useState(() => loadData('fin_bills', INIT_BILLS));
      const [loans, setLoans] = useState(() => loadData('fin_loans', INIT_LOANS));
      const [ins, setIns] = useState(() => loadData('fin_ins', INIT_INS));
      const [goals, setGoals] = useState(() => loadData('fin_goals', INIT_GOALS));

      useEffect(() => { localStorage.setItem('fin_cats', JSON.stringify(cats)); }, [cats]);
      useEffect(() => { localStorage.setItem('fin_txns', JSON.stringify(txns)); }, [txns]);
      useEffect(() => { localStorage.setItem('fin_bills', JSON.stringify(bills)); }, [bills]);
      useEffect(() => { localStorage.setItem('fin_loans', JSON.stringify(loans)); }, [loans]);
      useEffect(() => { localStorage.setItem('fin_ins', JSON.stringify(ins)); }, [ins]);
      useEffect(() => { localStorage.setItem('fin_goals', JSON.stringify(goals)); }, [goals]);

      const [currentMonth, setCurrentMonth] = useState(`${TODAY.year}-${String(TODAY.month).padStart(2, '0')}`);
      
      const [showBackup, setShowBackup] = useState(false);
      const [backupStr, setBackupStr] = useState("");
      const [importStr, setImportStr] = useState("");
      const [backupMsg, setBackupMsg] = useState("");

      const handleRestore = () => {
        try {
          const data = JSON.parse(importStr);
          if (data.cats) setCats(data.cats);
          if (data.txns) setTxns(data.txns);
          if (data.bills) setBills(data.bills);
          if (data.loans) setLoans(data.loans);
          if (data.ins) setIns(data.ins);
          if (data.goals) setGoals(data.goals);
          setBackupMsg("✅ 資料還原成功！");
          setImportStr("");
          setTimeout(() => { setShowBackup(false); setBackupMsg(""); }, 1500);
        } catch (e) {
          setBackupMsg("❌ 格式錯誤，請確認貼上的代碼是否完整");
        }
      };

      const addTxn = t => setTxns(p => [t, ...p]);
      const delTxn = id => setTxns(p => p.filter(t => t.id !== id));
      
      const urgentBills = bills.filter(b => !b.paid && (computeBill(b).urgent || computeBill(b).overdue)).length;

      const titles = { home: "家庭財務總覽", record: "記帳", analysis: "支出分析", bills: "帳單提醒", fin: "財務管理" };
      
      return (
        <div style={{ minHeight: "100vh", background: T.bg, color: T.slate, fontFamily: "'Noto Sans TC',sans-serif", position: "relative" }}>
          
          <div style={{ position: "sticky", top: 0, zIndex: 50, background: "rgba(245,247,242,0.96)", backdropFilter: "blur(16px)", borderBottom: `1px solid ${T.dim}`, padding: "13px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", maxWidth: 430, margin: "0 auto", paddingTop: "max(13px, env(safe-area-inset-top))" }}>
            <div>
              <div style={{ fontSize: 18, fontWeight: 900, color: T.g1, letterSpacing: -0.5 }}>家庭<span style={{ color: T.g2 }}>財務</span></div>
              <div style={{ fontSize: 10, color: T.muted }}>{titles[tab]}</div>
            </div>
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <button 
                onClick={() => { 
                  setBackupStr(JSON.stringify({ cats, txns, bills, loans, ins, goals })); 
                  setShowBackup(true); 
                  setBackupMsg("");
                  setImportStr("");
                }} 
                style={{ background: "transparent", border: "none", fontSize: 20, cursor: "pointer", padding: 0 }}
              >
                ⚙️
              </button>
              
              <div style={{ position: "relative" }}>
                <input 
                  type="month" 
                  value={currentMonth} 
                  onChange={e => setCurrentMonth(e.target.value)} 
                  style={{ opacity: 0, position: "absolute", inset: 0, cursor: "pointer", width: "100%", height: "100%" }} 
                />
                <div style={{ background: T.g5, border: `1.5px solid ${T.g4}`, borderRadius: 10, padding: "5px 12px", fontSize: 11, color: T.g1, fontWeight: 700, pointerEvents: "none" }}>
                  {currentMonth.replace("-", "年 ")}月 ▾
                </div>
              </div>
            </div>
          </div>
          
          <div style={{ maxWidth: 430, margin: "0 auto", padding: "16px 16px 100px", position: "relative" }}>
            {tab === "home" && <HomePage txns={txns} loans={loans} goals={goals} currentMonth={currentMonth} cats={cats} />}
            {tab === "record" && <RecordPage txns={txns} onAdd={addTxn} onDelete={delTxn} currentMonth={currentMonth} ObjectCats={cats} setCats={setCats} />}
            {tab === "analysis" && <AnalysisPage txns={txns} currentMonth={currentMonth} cats={cats} />}
            {tab === "bills" && <BillsPage bills={bills} setBills={setBills} cats={cats} />}
            {tab === "fin" && <FinancePage loans={loans} setLoans={setLoans} ins={ins} setIns={setIns} goals={goals} setGoals={setGoals} />}
          </div>

          <TabBar active={tab} setActive={setTab} urgentBills={urgentBills} />

          <Modal open={showBackup} onClose={() => setShowBackup(false)} title="⚙️ 設定與資料備份">
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ background: T.g5, padding: "12px 16px", borderRadius: 12 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: T.g1, marginBottom: 8 }}>📤 備份目前資料</div>
                <div style={{ fontSize: 11, color: T.muted, marginBottom: 8, lineHeight: 1.5 }}>
                  如果未來 APP 有更新，請先全選並複製下方的代碼，到新版本貼上還原，資料就不會遺失囉！
                </div>
                <textarea 
                  readOnly 
                  value={backupStr} 
                  onClick={(e) => e.target.select()}
                  style={{ width: "100%", height: 60, padding: "8px", borderRadius: 8, border: `1px solid ${T.dim}`, fontSize: 10, color: T.slate, fontFamily: "monospace", boxSizing: "border-box", resize: "none" }}
                />
              </div>

              <div style={{ background: "#FFF8F0", padding: "12px 16px", borderRadius: 12 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: T.amber, marginBottom: 8 }}>📥 還原舊資料</div>
                <div style={{ fontSize: 11, color: T.muted, marginBottom: 8, lineHeight: 1.5 }}>
                  請將之前複製的備份代碼貼在下方，並點擊還原按鈕（注意：這會覆蓋目前的資料）。
                </div>
                <textarea 
                  value={importStr} 
                  onChange={e => setImportStr(e.target.value)}
                  placeholder="在此貼上備份代碼..."
                  style={{ width: "100%", height: 60, padding: "8px", borderRadius: 8, border: `1px solid ${T.amber}66`, fontSize: 10, color: T.slate, fontFamily: "monospace", boxSizing: "border-box", resize: "none", marginBottom: 8 }}
                />
                {backupMsg && <div style={{ fontSize: 12, fontWeight: 700, color: backupMsg.includes("✅") ? T.g2 : T.red, marginBottom: 8 }}>{backupMsg}</div>}
                <Btn onClick={handleRestore} color={T.amber} style={{ width: "100%" }} disabled={!importStr.trim()}>確認還原資料</Btn>
              </div>
            </div>
          </Modal>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
